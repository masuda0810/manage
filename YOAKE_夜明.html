<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOAKE — 夜明</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#02030a; }
  body { font-family:'Hiragino Mincho ProN','Yu Mincho','Hiragino Sans',serif; }
  canvas { position:fixed; inset:0; width:100vw; height:100vh; display:block; }

  /* ---------- intro overlay ---------- */
  #intro {
    position:fixed; inset:0; z-index:50; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 70%, #0a0e24 0%, #02030a 70%);
    transition:opacity 2.2s ease; user-select:none;
  }
  #intro.gone { opacity:0; pointer-events:none; }
  #intro h1 {
    color:#e9ecff; font-size:64px; font-weight:500; letter-spacing:.55em;
    text-indent:.55em; text-shadow:0 0 40px rgba(140,160,255,.5);
    animation:breathe 5s ease-in-out infinite;
  }
  #intro .kanji {
    color:#aab3e0; font-size:17px; letter-spacing:1.2em; text-indent:1.2em; margin-top:14px;
  }
  #intro .desc {
    color:#6a72a3; font-size:12.5px; letter-spacing:.25em; margin-top:46px; line-height:2.2;
    text-align:center;
  }
  #intro .start {
    color:#cdd4ff; font-size:13px; letter-spacing:.4em; margin-top:40px;
    animation:pulse 2.6s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:.85} 50%{opacity:1} }
  @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.95} }

  /* ---------- HUD ---------- */
  .hud { position:fixed; z-index:10; color:#8d96c5; user-select:none;
         opacity:0; transition:opacity 1.5s; }
  .hud.show { opacity:1; }
  #clock { left:26px; bottom:22px; font-size:13px; letter-spacing:.3em; }
  #clock .lbl { font-size:10px; color:#5a628e; margin-right:10px; }
  #hint {
    left:50%; transform:translateX(-50%); bottom:22px; font-size:11px;
    letter-spacing:.28em; color:#62699a; white-space:nowrap;
  }
  #ctrl { right:22px; bottom:18px; display:flex; gap:10px; }
  #ctrl button {
    appearance:none; background:rgba(20,24,52,.45); color:#aab2e0;
    border:1px solid rgba(160,170,230,.25); border-radius:999px;
    font-family:inherit; font-size:12px; letter-spacing:.25em; text-indent:.25em;
    padding:8px 18px; cursor:pointer; backdrop-filter:blur(8px);
    transition:all .25s;
  }
  #ctrl button:hover { background:rgba(60,70,130,.5); color:#fff; }
  #sig { right:24px; top:20px; font-size:9px; letter-spacing:.22em; color:#3f4670;
         text-align:right; line-height:1.9; }
  #err {
    position:fixed; inset:0; z-index:99; display:none; color:#cfd4f0;
    align-items:center; justify-content:center; text-align:center;
    font-size:14px; line-height:2; background:#05060f; padding:40px;
  }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div id="intro">
  <h1>YOAKE</h1>
  <div class="kanji">夜　明</div>
  <div class="desc">
    空も、海も、星も、音楽も、すべてこの瞬間に計算で生まれています。<br>
    画像も音源も使っていません。同じ夜は、二度と訪れません。
  </div>
  <div class="start">— クリックして、夜をはじめる —</div>
</div>

<div class="hud" id="clock"><span class="lbl">いまの時刻</span><span id="clockTime">23:00</span></div>
<div class="hud" id="hint">クリック : 流れ星と音色 ／ マウス : 視点 ／ 右下 : 夜明けを呼ぶ</div>
<div class="hud" id="ctrl">
  <button id="dawnBtn">夜明けを呼ぶ</button>
  <button id="muteBtn">音 ON</button>
</div>
<div class="hud" id="sig">REALTIME GENERATED<br>NO IMAGES · NO AUDIO FILES · NO LIBRARIES<br>SINGLE FILE</div>

<div id="err"></div>

<script>
'use strict';
/* ================================================================
   YOAKE — 夜明
   1ファイル / ライブラリなし / 素材なし
   ・風景 : WebGL2 フラグメントシェーダーによる完全手続き生成
   ・音楽 : WebAudio によるリアルタイム自動作曲(ペンタトニック)
   ================================================================ */

// ----------------------------------------------------------------
// 1. SHADERS
// ----------------------------------------------------------------
const VERT = `#version 300 es
void main(){
  vec2 p = vec2((gl_VertexID<<1)&2, gl_VertexID&2);
  gl_Position = vec4(p*2.0-1.0, 0.0, 1.0);
}`;

const FRAG = `#version 300 es
precision highp float;
out vec4 fragColor;
uniform vec2  uRes;
uniform float uT;
uniform vec2  uM;
uniform float uDawn;    // 0..1  sunrise amount
uniform float uNight;   // 0..1  deep-night amount
uniform float uSunY;
uniform float uAur;     // aurora activity
uniform vec4  uStars[8];// shooting stars: x, y, t0, active

#define HORIZON -0.12

float h21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float n2(vec2 p){
  vec2 i=floor(p), f=fract(p);
  vec2 u=f*f*(3.0-2.0*f);
  return mix(mix(h21(i),h21(i+vec2(1.0,0.0)),u.x),
             mix(h21(i+vec2(0.0,1.0)),h21(i+vec2(1.0,1.0)),u.x),u.y);
}
float fbm(vec2 p){
  float a=0.5, s=0.0;
  for(int i=0;i<5;i++){ s+=a*n2(p); p=p*2.03+vec2(1.7,9.2); a*=0.5; }
  return s;
}
float segd(vec2 p, vec2 a, vec2 b){
  vec2 pa=p-a, ba=b-a;
  float h=clamp(dot(pa,ba)/dot(ba,ba),0.0,1.0);
  return length(pa-ba*h);
}

vec3 skyBase(vec2 uv){
  float h=clamp((uv.y-HORIZON)/1.3,0.0,1.0);
  vec3 zen=mix(vec3(0.010,0.014,0.042), vec3(0.10,0.085,0.21), uDawn);
  vec3 hor=mix(vec3(0.040,0.055,0.130), vec3(0.98,0.42,0.20), uDawn);
  vec3 col=mix(hor,zen,pow(h,0.62));
  // sun
  vec2 sp=vec2(-0.12,uSunY);
  float sd=length(uv-sp);
  col+=vec3(1.0,0.52,0.22)*uDawn*0.55*exp(-sd*2.4);
  col+=vec3(1.0,0.62,0.30)*uDawn*0.18*exp(-sd*1.0);
  col+=vec3(1.0,0.82,0.55)*uDawn*2.6*exp(-sd*sd*650.0);
  return col;
}

vec3 sceneSky(vec2 uv, float refl){
  vec3 col=skyBase(uv);

  // clouds (also occlude stars)
  float cl=fbm(vec2(uv.x*1.8 - uT*0.013, (uv.y-HORIZON)*4.2));
  cl*=smoothstep(0.95,0.0,uv.y-HORIZON);
  cl=smoothstep(0.46,0.84,cl);

  float starVis=uNight*(1.0-cl)*(1.0-refl*0.45);

  // stars — two layers (small dense / large rare)
  float st=0.0;
  for(int L=0;L<2;L++){
    float sc=(L==0)?75.0:30.0;
    vec2 g=uv*sc+float(L)*37.0;
    vec2 id=floor(g), f=fract(g);
    float h=h21(id);
    float thr=(L==0)?0.22:0.06;
    if(h<thr){
      vec2 sp=vec2(h21(id+13.1),h21(id+7.7))*0.8+0.1;
      float d=length(f-sp);
      float tw=0.55+0.45*sin(uT*(1.5+h*5.0)+h*60.0);
      st+=exp(-d*d*((L==0)?95.0:55.0))*tw*((L==0)?0.85:1.40);
    }
  }
  col+=vec3(0.80,0.88,1.0)*st*starVis;

  // milky way
  vec2 mw=mat2(0.86,0.5,-0.5,0.86)*uv;
  float band=exp(-abs(mw.y-0.22)*2.1);
  float dens=fbm(mw*vec2(1.6,5.0)+3.0);
  float dust=fbm(mw*vec2(3.1,9.0)+17.0);
  col+=vec3(0.42,0.52,0.85)*band*dens*dens*0.55*starVis;
  col-=vec3(0.05)*band*smoothstep(0.5,0.85,dust)*starVis;

  // aurora curtains
  vec3 aur=vec3(0.0);
  for(int i=0;i<3;i++){
    float fi=float(i);
    float y0=0.30+fi*0.15+0.22*fbm(vec2(uv.x*0.6+fi*3.7, uT*0.045+fi*11.0));
    float bnd=exp(-pow((uv.y-y0)*3.8,2.0));
    float curt=fbm(vec2(uv.x*2.6+uT*0.055*(1.0+fi*0.4), fi*7.0+uT*0.012));
    curt=pow(curt,2.3);
    aur+=mix(vec3(0.05,0.85,0.45),vec3(0.45,0.20,0.90),fi*0.5)*bnd*curt;
  }
  col+=aur*1.1*uAur*uNight*(1.0-cl*0.7);

  // moon
  vec2 mp=vec2(0.62,0.46);
  float md=length(uv-mp);
  float moon=smoothstep(0.052,0.047,md);
  float mtex=0.78+0.22*fbm((uv-mp)*30.0+4.0);
  col+=vec3(0.92,0.95,1.0)*uNight*(moon*0.9*mtex+exp(-md*6.5)*0.12);

  // cloud tint over everything
  vec3 cloudCol=mix(vec3(0.016,0.024,0.055), vec3(1.0,0.45,0.33), uDawn);
  cloudCol+=vec3(0.9,0.95,1.0)*uNight*exp(-length(uv-mp)*3.0)*0.12;
  col=mix(col,cloudCol,cl*0.85);

  // shooting stars
  for(int i=0;i<8;i++){
    vec4 s=uStars[i];
    float age=uT-s.z;
    if(s.w>0.5 && age>0.0 && age<1.1){
      vec2 dir=normalize(vec2(-0.55-0.5*h21(vec2(s.z,1.0)), -0.45));
      vec2 ppos=s.xy+dir*age*1.4;
      float d=segd(uv,ppos,ppos-dir*0.16);
      float fade=1.0-age/1.1;
      col+=vec3(0.85,0.92,1.0)*exp(-d*d*22000.0)*fade*1.6;
      col+=vec3(0.40,0.50,0.95)*exp(-d*d*900.0)*fade*0.22;
    }
  }
  return col;
}

void main(){
  vec2 uv=(gl_FragCoord.xy*2.0-uRes)/uRes.y;
  uv+=uM*vec2(0.06,0.04);

  vec3 col;
  float r1=HORIZON+0.30*fbm(vec2(uv.x*0.75+7.3,2.0))-0.015;
  float r2=HORIZON+0.16*fbm(vec2(uv.x*1.40+23.0,5.0))-0.015;

  if(uv.y>HORIZON){
    col=sceneSky(uv,0.0);
    // far ridge (with atmospheric fog)
    vec3 mc1=mix(vec3(0.030,0.038,0.078), vec3(0.32,0.13,0.16), uDawn*0.85);
    float m1=smoothstep(r1+0.004,r1-0.004,uv.y);
    vec3 fogc=mix(skyBase(vec2(uv.x,HORIZON+0.05)),mc1,0.72);
    col=mix(col,fogc,m1);
    // near ridge (dark)
    vec3 mc2=mix(vec3(0.011,0.014,0.032), vec3(0.10,0.05,0.09), uDawn*0.8);
    float m2=smoothstep(r2+0.003,r2-0.003,uv.y);
    col=mix(col,mc2,m2);
    // dawn birds — flying toward the sun
    float bird=0.0;
    for(int i=0;i<6;i++){
      float fi=float(i);
      float sp=0.045+0.015*h21(vec2(fi,3.0));
      float bx=1.4-mod(uT*sp+fi*0.47,2.8);
      float by=0.26+0.30*h21(vec2(fi,9.0))+0.025*sin(uT*1.3+fi*2.0);
      vec2 bp=uv-vec2(bx,by);
      float wsz=0.015+0.007*h21(vec2(fi,5.0));
      float flap=abs(sin(uT*6.5+fi*1.7))*0.85+0.12;
      float dL=segd(bp,vec2(0.0),vec2(-wsz, wsz*flap));
      float dR=segd(bp,vec2(0.0),vec2( wsz, wsz*flap));
      bird+=smoothstep(0.0035,0.0012,min(dL,dR));
    }
    col=mix(col,vec3(0.04,0.025,0.05),clamp(bird,0.0,1.0)*uDawn*0.9);
  } else {
    float depth=HORIZON-uv.y;
    vec2 ruv=vec2(uv.x,2.0*HORIZON-uv.y);
    float wob=fbm(vec2(uv.x*5.0,uv.y*30.0-uT*0.5))-0.5;
    ruv.x+=wob*0.28*smoothstep(0.0,0.5,depth);
    ruv.y+=wob*0.07*depth;
    vec3 refl=sceneSky(ruv,1.0);
    // reflected near ridge
    float rr2=HORIZON+0.16*fbm(vec2(ruv.x*1.40+23.0,5.0))-0.015;
    float rm=smoothstep(rr2+0.012,rr2-0.012,ruv.y);
    refl=mix(refl,vec3(0.010,0.012,0.028),rm*0.92);
    vec3 deep=mix(vec3(0.008,0.014,0.036), vec3(0.10,0.05,0.06), uDawn*0.6);
    col=mix(refl*0.60, deep, smoothstep(0.0,0.75,depth)*0.62);
    // light path (moon at night, sun at dawn)
    float lx=mix(0.62,-0.12,uDawn);
    float beam=exp(-pow((uv.x-lx)*(3.2/(depth+0.22)),2.0));
    float spark=pow(n2(vec2(uv.x*180.0,uv.y*260.0-uT*2.0)),8.0)*3.5;
    vec3 lcol=mix(vec3(0.85,0.90,1.0)*uNight, vec3(1.0,0.55,0.25), uDawn);
    col+=lcol*beam*(0.10+spark)*smoothstep(0.80,0.04,depth)*(0.45*uNight+0.85*uDawn);
  }

  // vignette / tonemap / grain
  col*=1.0-0.32*dot(uv*0.72,uv*0.72);
  col=1.0-exp(-col*2.1);
  col=pow(col,vec3(0.92));
  col+=(h21(gl_FragCoord.xy+fract(uT)*113.0)-0.5)*0.016;
  fragColor=vec4(col,1.0);
}`;

// ----------------------------------------------------------------
// 2. WEBGL SETUP
// ----------------------------------------------------------------
const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl2', { antialias:false, alpha:false });
function fail(msg){
  const e = document.getElementById('err');
  e.style.display = 'flex';
  e.textContent = msg;
  console.error(msg);
}
if (!gl){ fail('お使いの環境では WebGL2 が利用できないため、この作品を表示できません。'); throw new Error('no webgl2'); }

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    const log = gl.getShaderInfoLog(s);
    fail('SHADER COMPILE ERROR:\n' + log);
    throw new Error(log);
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)){
  fail('LINK ERROR: ' + gl.getProgramInfoLog(prog));
  throw new Error('link');
}
gl.useProgram(prog);
const U = {};
['uRes','uT','uM','uDawn','uNight','uSunY','uAur'].forEach(n => U[n] = gl.getUniformLocation(prog, n));
U.uStars = gl.getUniformLocation(prog, 'uStars[0]');

let W=0, H=0, scale=1;
const DPR = Math.min(window.devicePixelRatio||1, 1.75);
function resize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = Math.floor(W*DPR*scale);
  canvas.height = Math.floor(H*DPR*scale);
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ----------------------------------------------------------------
// 3. TIME OF DAY  (one cycle = 150s : night → dawn → night)
// ----------------------------------------------------------------
function sstep(a,b,x){ x=Math.min(1,Math.max(0,(x-a)/(b-a))); return x*x*(3-2*x); }
const CYCLE = 150;
let phaseTime = 8 + Math.random()*20;     // start somewhere in the night
let warp = 1, warpTarget = 1;
let dawnNow = 0, nightNow = 1;

// debug: ?p=0.75 forces phase
const forcedP = new URLSearchParams(location.search).get('p');
if (forcedP !== null) phaseTime = parseFloat(forcedP)*CYCLE;

function phase(){ return (phaseTime/CYCLE)%1; }

document.getElementById('dawnBtn').addEventListener('click', () => {
  const p = phase();
  if (p > 0.5 && p < 0.9) return;       // already dawning
  warpTarget = 30;
});

// ----------------------------------------------------------------
// 4. GENERATIVE MUSIC  (WebAudio — composed in realtime)
// ----------------------------------------------------------------
let AC=null, master=null, busIn=null, muted=false, audioOK=false;
const SCALE = [261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.26,783.99,880.00]; // C pent ×2 oct
const ROOTS = [130.81,110.00,87.31,98.00];  // C / Am / F / G
let padOscs = [];

function initAudio(){
  try {
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.0;
    master.connect(AC.destination);
    master.gain.setTargetAtTime(0.9, AC.currentTime, 2.5);

    // reverb bus
    busIn = AC.createGain();
    const dry = AC.createGain(); dry.gain.value = 0.65;
    busIn.connect(dry); dry.connect(master);
    const conv = AC.createConvolver();
    const len = Math.floor(AC.sampleRate*3.4);
    const imp = AC.createBuffer(2, len, AC.sampleRate);
    for (let ch=0; ch<2; ch++){
      const d = imp.getChannelData(ch);
      for (let i=0;i<len;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/len, 2.6);
    }
    conv.buffer = imp;
    const wet = AC.createGain(); wet.gain.value = 0.55;
    busIn.connect(conv); conv.connect(wet); wet.connect(master);

    // ocean (filtered looped noise with slow swell)
    const nlen = AC.sampleRate*4;
    const nbuf = AC.createBuffer(1, nlen, AC.sampleRate);
    const nd = nbuf.getChannelData(0);
    let last = 0;
    for (let i=0;i<nlen;i++){ last = (last + (Math.random()*2-1)*0.02)*0.998; nd[i]=last*3; }
    const nsrc = AC.createBufferSource(); nsrc.buffer = nbuf; nsrc.loop = true;
    const nfl = AC.createBiquadFilter(); nfl.type='lowpass'; nfl.frequency.value=420;
    const ng = AC.createGain(); ng.gain.value = 0.05;
    const lfo = AC.createOscillator(); lfo.frequency.value = 0.06;
    const lfog = AC.createGain(); lfog.gain.value = 0.028;
    lfo.connect(lfog); lfog.connect(ng.gain);
    nsrc.connect(nfl); nfl.connect(ng); ng.connect(master);
    nsrc.start(); lfo.start();

    // pad (3 voices × 2 detuned saws → lowpass)
    const padFl = AC.createBiquadFilter(); padFl.type='lowpass'; padFl.frequency.value=480; padFl.Q.value=0.4;
    const padLfo = AC.createOscillator(); padLfo.frequency.value=0.05;
    const padLfoG = AC.createGain(); padLfoG.gain.value=180;
    padLfo.connect(padLfoG); padLfoG.connect(padFl.frequency); padLfo.start();
    padFl.connect(busIn);
    const intervals = [1, 1.5, 2];
    intervals.forEach(iv => {
      [-5, 5].forEach(det => {
        const o = AC.createOscillator(); o.type='sawtooth';
        o.frequency.value = ROOTS[0]*iv; o.detune.value = det;
        const g = AC.createGain(); g.gain.value = 0.016;
        o.connect(g); g.connect(padFl); o.start();
        padOscs.push({osc:o, iv});
      });
    });

    // scheduler
    let nextStep = AC.currentTime + 0.2, stepIdx = 0;
    const stepDur = 0.5; // 8th notes @60bpm
    setInterval(() => {
      if (!AC) return;
      while (nextStep < AC.currentTime + 0.45){
        scheduleStep(nextStep, stepIdx);
        nextStep += stepDur; stepIdx++;
      }
    }, 120);

    audioOK = true;
  } catch(e){ console.error('audio init failed', e); }
}

function scheduleStep(t, i){
  const chord = Math.floor(i/16) % ROOTS.length;
  const root = ROOTS[chord];
  if (i % 16 === 0){
    // glide pad to new chord, soft bass
    padOscs.forEach(p => p.osc.frequency.setTargetAtTime(root*p.iv, t, 1.4));
    pluck(root/2, t, 0.16, 8, 'sine', 600);
  }
  // melody — denser as dawn approaches
  const prob = 0.26 + dawnNow*0.5;
  if (Math.random() < prob){
    const hiBias = dawnNow*3;
    const idx = Math.min(SCALE.length-1, Math.floor(Math.random()*(SCALE.length-3) + Math.random()*hiBias));
    pluck(SCALE[idx], t + Math.random()*0.06, 0.05+Math.random()*0.09, 2.8, 'triangle', 2400);
  }
  // dawn shimmer
  if (dawnNow > 0.7 && Math.random() < 0.5){
    const f = SCALE[5 + Math.floor(Math.random()*5)] * 2;
    pluck(f, t + Math.random()*0.25, 0.028, 1.6, 'sine', 5000);
  }
}

function pluck(freq, t, vel, dur, type, cutoff){
  if (!AC) return;
  const o = AC.createOscillator(); o.type = type; o.frequency.value = freq;
  const o2 = AC.createOscillator(); o2.type = 'sine'; o2.frequency.value = freq*2;
  const g = AC.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vel, t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  const g2 = AC.createGain();
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(vel*0.25, t+0.012);
  g2.gain.exponentialRampToValueAtTime(0.0001, t+dur*0.45);
  const fl = AC.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=cutoff;
  o.connect(g); g.connect(fl);
  o2.connect(g2); g2.connect(fl);
  fl.connect(busIn);
  o.start(t); o2.start(t);
  o.stop(t+dur+0.1); o2.stop(t+dur+0.1);
}

function chime(){
  if (!AC) return;
  const t = AC.currentTime + 0.02;
  const f = SCALE[4 + Math.floor(Math.random()*5)];
  pluck(f,     t,      0.10, 3.0, 'triangle', 3000);
  pluck(f*1.5, t+0.16, 0.07, 3.0, 'triangle', 3000);
}

document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '音 OFF' : '音 ON';
  if (master) master.gain.setTargetAtTime(muted ? 0 : 0.9, AC.currentTime, 0.4);
});
window.addEventListener('keydown', e => {
  if (e.key === 'm' || e.key === 'M') document.getElementById('muteBtn').click();
});

// ----------------------------------------------------------------
// 5. INTERACTION
// ----------------------------------------------------------------
let mx=0, my=0, tmx=0, tmy=0;
window.addEventListener('pointermove', e => {
  tmx = (e.clientX/W)*2-1;
  tmy = -((e.clientY/H)*2-1);
});

const starBuf = new Float32Array(32); // 8 × vec4
let starPtr = 0;
function spawnStar(ux, uy){
  const o = starPtr*4; starPtr = (starPtr+1)%8;
  starBuf[o]=ux; starBuf[o+1]=uy; starBuf[o+2]=nowT; starBuf[o+3]=1;
}

let started = false;
const intro = document.getElementById('intro');
function start(){
  if (started) return;
  started = true;
  initAudio();
  intro.classList.add('gone');
  setTimeout(()=>{ intro.style.display='none'; }, 2400);
  document.querySelectorAll('.hud').forEach(h => h.classList.add('show'));
  setTimeout(()=>{ document.getElementById('hint').classList.remove('show'); }, 12000);
}
intro.addEventListener('click', start);

canvas.addEventListener('pointerdown', e => {
  if (!started) return;
  const ux = (e.clientX*2 - W)/H;
  const uy = (H - e.clientY*2)/H;
  if (uy > 0.0){ spawnStar(ux, Math.max(uy, 0.15)); }
  chime();
});

// ----------------------------------------------------------------
// 6. MAIN LOOP
// ----------------------------------------------------------------
let nowT = 0;
const t0 = performance.now();
let prev = t0, slowAcc = 0, slowCnt = 0;

function frame(pn){
  const dt = Math.min(0.1, (pn - prev)/1000); prev = pn;
  nowT = (pn - t0)/1000;

  // time-of-day
  warp += (warpTarget - warp)*0.04;
  phaseTime += dt*warp;
  const p = phase();
  if (warpTarget > 1 && p > 0.56 && p < 0.9) warpTarget = 1;
  dawnNow  = sstep(0.50,0.72,p) * (1 - sstep(0.86,0.98,p));
  nightNow = 1 - sstep(0.45,0.60,p) * (1 - sstep(0.88,1.0,p));
  const sunY = -0.42 + 0.60*dawnNow;
  const aur  = 0.45 + 0.55*Math.sin(phaseTime*0.045 + 2.0);

  // clock: map p → 22:00..06:00
  const hrs = (22 + p*8) % 24;
  const hh = Math.floor(hrs), mm = Math.floor((hrs-hh)*60);
  document.getElementById('clockTime').textContent =
    String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');

  // auto shooting stars at night
  if (started && nightNow > 0.5 && Math.random() < 0.004){
    spawnStar((Math.random()*2-1)*W/H*0.9, 0.2 + Math.random()*0.55);
  }

  // smooth mouse parallax
  mx += (tmx-mx)*0.03; my += (tmy-my)*0.03;

  gl.uniform2f(U.uRes, canvas.width, canvas.height);
  gl.uniform1f(U.uT, nowT);
  gl.uniform2f(U.uM, mx, my);
  gl.uniform1f(U.uDawn, dawnNow);
  gl.uniform1f(U.uNight, nightNow);
  gl.uniform1f(U.uSunY, sunY);
  gl.uniform1f(U.uAur, aur);
  gl.uniform4fv(U.uStars, starBuf);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // adaptive resolution
  slowAcc += dt; slowCnt++;
  if (slowCnt >= 90){
    if (slowAcc/slowCnt > 0.026 && scale > 0.55){ scale *= 0.8; resize(); }
    slowAcc = 0; slowCnt = 0;
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
